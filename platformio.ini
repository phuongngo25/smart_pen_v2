[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001

; Required libraries for Smart Pen WebSocket functionality
lib_deps = 
    markus-sattler/WebSockets@^2.5.4
    bblanchon/ArduinoJson@^7.2.1
    Wire

; Build flags for better performance
build_flags = 
    -DCORE_DEBUG_LEVEL=1
    -DARDUINOJSON_ENABLE_PROGMEM=1

; Upload settings
upload_speed = 921600
monitor_filters = 
    esp32_exception_decoder 