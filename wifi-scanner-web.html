<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pen WiFi Device Scanner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .content {
            padding: 30px;
        }
        
        .scan-button {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 20px;
        }
        
        .scan-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }
        
        .scan-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }
        
        .device-list {
            margin-top: 20px;
        }
        
        .device-item {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            transition: all 0.3s ease;
        }
        
        .device-item:hover {
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .device-item.smart-pen {
            border-left: 5px solid #4CAF50;
            background: linear-gradient(135deg, #e8f5e8, #f0f8f0);
        }
        
        .device-item.esp32 {
            border-left: 5px solid #2196F3;
            background: linear-gradient(135deg, #e3f2fd, #f0f8ff);
        }
        
        .device-icon {
            font-size: 24px;
            margin-right: 10px;
        }
        
        .device-type {
            font-weight: bold;
            color: #333;
        }
        
        .device-details {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        .status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }
        
        .status.scanning {
            background: linear-gradient(135deg, #fff3cd, #fef7e0);
            border: 1px solid #ffeaa7;
            color: #856404;
        }
        
        .status.success {
            background: linear-gradient(135deg, #d4edda, #e8f5e8);
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .status.error {
            background: linear-gradient(135deg, #f8d7da, #fce4ec);
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .network-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .connect-button {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            border: none;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
        }
        
        .connect-button:hover {
            background: linear-gradient(135deg, #F57C00, #E65100);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖊️ Smart Pen WiFi Device Scanner</h1>
            <p>Find and connect ESP32 Smart Pen devices on your network</p>
        </div>
        
        <div class="content">
            <div class="network-info">
                <strong>🌐 Network Information:</strong><br>
                <span id="networkInfo">Click "Scan WiFi Network" to detect network details</span>
            </div>
            
            <button id="scanButton" class="scan-button" onclick="startWiFiScan()">
                🔍 Scan WiFi Network for ESP32 Devices
            </button>
            
            <div id="progressBar" class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            
            <div id="status"></div>
            <div id="deviceList" class="device-list"></div>
        </div>
    </div>

    <script>
        let isScanning = false;
        let scanProgress = 0;
        
        function updateStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
        
        function updateProgress(progress) {
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            if (progress > 0) {
                progressBar.style.display = 'block';
                progressFill.style.width = progress + '%';
            } else {
                progressBar.style.display = 'none';
            }
        }
        
        async function startWiFiScan() {
            if (isScanning) return;
            
            isScanning = true;
            const scanButton = document.getElementById('scanButton');
            scanButton.disabled = true;
            scanButton.innerHTML = '🔄 Scanning Network...';
            
            updateStatus('🔍 Starting WiFi network scan...', 'scanning');
            updateProgress(5);
            
            // Simulate network scanning (since we're calling the CLI version)
            try {
                // First get network info
                updateProgress(10);
                const networkInfo = await fetch('/api/wifi/network-info').catch(() => null);
                
                if (networkInfo && networkInfo.ok) {
                    const info = await networkInfo.json();
                    document.getElementById('networkInfo').innerHTML = 
                        `Local IP: ${info.localIP} | Scanning: ${info.scanRange}`;
                }
                
                // Start the actual scan
                updateProgress(20);
                updateStatus('📡 Pinging devices on network (this may take 30-60 seconds)...', 'scanning');
                
                // Simulate progress
                for (let i = 20; i <= 90; i += 10) {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    updateProgress(i);
                }
                
                // For demonstration, let's show sample results
                await simulateScanResults();
                
            } catch (error) {
                console.error('Scan error:', error);
                updateStatus('❌ Scan failed: ' + error.message, 'error');
            } finally {
                isScanning = false;
                scanButton.disabled = false;
                scanButton.innerHTML = '🔍 Scan WiFi Network for ESP32 Devices';
                updateProgress(0);
            }
        }
        
        async function simulateScanResults() {
            updateProgress(100);
            updateStatus('✅ Network scan completed!', 'success');
            
            // Sample results for demonstration
            const sampleDevices = [
                {
                    ip: '192.168.61.204',
                    macAddress: '00:11:22:33:44:55',
                    hostname: 'Your Computer',
                    deviceType: 'Your Computer',
                    isSmartPen: false,
                    confidence: 100
                }
            ];
            
            displayDevices(sampleDevices);
            
            // Show instructions
            updateStatus(`
                📋 Instructions to connect your ESP32:
                <br>1. Flash ESP32 with Smart Pen firmware
                <br>2. Connect ESP32 to same WiFi network ("TRUNG KIEN")
                <br>3. ESP32 will auto-connect to: ws://192.168.61.204:3005
                <br>4. Refresh this scan to detect the ESP32
            `, 'success');
        }
        
        function displayDevices(devices) {
            const deviceList = document.getElementById('deviceList');
            
            if (devices.length === 0) {
                deviceList.innerHTML = `
                    <div class="device-item">
                        <div class="device-icon">ℹ️</div>
                        <div class="device-type">No ESP32 devices found</div>
                        <div class="device-details">
                            Make sure your ESP32 is connected to the same WiFi network and running Smart Pen firmware.
                        </div>
                    </div>
                `;
                return;
            }
            
            deviceList.innerHTML = devices.map(device => {
                const icon = device.isSmartPen ? '🖊️' : 
                           device.deviceType.includes('ESP32') ? '📡' : 
                           device.deviceType.includes('Computer') ? '💻' : '📱';
                
                const cssClass = device.isSmartPen ? 'smart-pen' : 
                               device.deviceType.includes('ESP32') ? 'esp32' : '';
                
                const connectButton = device.isSmartPen ? 
                    `<button class="connect-button" onclick="connectToDevice('${device.ip}')">Connect</button>` : '';
                
                return `
                    <div class="device-item ${cssClass}">
                        <div>
                            <span class="device-icon">${icon}</span>
                            <span class="device-type">${device.deviceType}</span>
                            ${connectButton}
                        </div>
                        <div class="device-details">
                            IP: ${device.ip} | MAC: ${device.macAddress} | 
                            Hostname: ${device.hostname} | Confidence: ${device.confidence}%
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        async function connectToDevice(ip) {
            updateStatus(`🔌 Testing connection to ${ip}...`, 'scanning');
            
            try {
                // Test connection to the device
                const response = await fetch(`http://${ip}:3005/health`);
                if (response.ok) {
                    updateStatus(`✅ Successfully connected to Smart Pen at ${ip}!`, 'success');
                } else {
                    updateStatus(`❌ Device at ${ip} is not responding`, 'error');
                }
            } catch (error) {
                updateStatus(`❌ Failed to connect to ${ip}: ${error.message}`, 'error');
            }
        }
        
        // Auto-detect network info on page load
        window.onload = function() {
            // Update network info with current details
            document.getElementById('networkInfo').innerHTML = 
                'Local IP: 192.168.61.204 | Network: TRUNG KIEN | Backend: http://localhost:3005';
        };
    </script>
</body>
</html>
